; ==========================================================
ruleset=🛑 WebRTC 拦截,[]DOMAIN-KEYWORD,stun
ruleset=🛑 WebRTC 拦截,[]DOMAIN-KEYWORD,turn
ruleset=🛑 WebRTC 拦截,clash-domain:https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_WebRTC_Stun.yaml,86400
